name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  default:
    strategy:
      fail-fast: false
      matrix:
        ros: [jazzy]

    name: ${{ matrix.ros }}
    runs-on: ubuntu-latest
    env:
      ROS_DISTRO: ${{ matrix.ros }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: industrial_ci
        uses: ros-industrial/industrial_ci@master
